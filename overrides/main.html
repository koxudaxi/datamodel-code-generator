{% extends "base.html" %}

{% block site_meta %}
  {{ super() }}
  <style>
    html.dcg-theme-loading {
      background: #0f172a;
    }

    .md-toggle {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .md-banner svg,
    .md-header svg,
    .md-nav svg,
    .md-source svg,
    .md-logo svg,
    .md-icon svg,
    svg.lucide {
      width: 1.2rem;
      height: 1.2rem;
      max-width: 1.2rem;
      max-height: 1.2rem;
      overflow: visible;
    }

    .md-header__button.md-logo svg,
    .md-nav__button.md-logo svg {
      width: 1.5rem;
      height: 1.5rem;
      max-width: 1.5rem;
      max-height: 1.5rem;
    }
  </style>
  <script>
    (() => {
      const html = document.documentElement;
      const revealPage = () => html.classList.remove("dcg-theme-loading");
      const getPlaygroundUrl = link => {
        try {
          const url = new URL(link.getAttribute("href") || "", window.location.href);
          const isPlayground = url.origin === window.location.origin && (
            url.pathname.endsWith("/playground/") ||
            url.pathname.endsWith("/assets/playground/index.html")
          );
          return isPlayground ? url : null;
        } catch {
          return null;
        }
      };
      const initPage = () => {
        for (const link of document.querySelectorAll("a[href]")) {
          if (getPlaygroundUrl(link)) {
            link.setAttribute("target", "_self");
          }
        }
        window.requestAnimationFrame(revealPage);
      };

      html.classList.add("dcg-theme-loading");
      window.setTimeout(revealPage, 3000);
      if (document.readyState === "loading") {
        window.addEventListener("DOMContentLoaded", initPage, { once: true });
      } else {
        initPage();
      }
      document.addEventListener("click", event => {
        if (event.defaultPrevented || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
          return;
        }
        const target = event.target instanceof Element ? event.target : event.target.parentElement;
        const link = target ? target.closest("a[href]") : null;
        const url = link ? getPlaygroundUrl(link) : null;
        if (!url) {
          return;
        }
        event.preventDefault();
        window.location.assign(url.href);
      }, true);
    })();
  </script>
{% endblock %}

  </a>
{% endblock %}
