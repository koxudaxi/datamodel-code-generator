{% extends "base.html" %}

{% block site_meta %}
  {{ super() }}
  <style>
    html.dcg-theme-loading {
      background: #0f172a;
    }

    html.dcg-theme-loading body {
      visibility: hidden;
    }

    .md-toggle {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .md-banner svg,
    .md-header svg,
    .md-nav svg,
    .md-source svg,
    .md-logo svg,
    .md-icon svg,
    svg.lucide {
      width: 1.2rem;
      height: 1.2rem;
      max-width: 1.2rem;
      max-height: 1.2rem;
      overflow: visible;
    }

    .md-header__button.md-logo svg,
    .md-nav__button.md-logo svg {
      width: 1.5rem;
      height: 1.5rem;
      max-width: 1.5rem;
      max-height: 1.5rem;
    }
  </style>
  <script>
    document.documentElement.classList.add("dcg-theme-loading");
    window.setTimeout(() => {
      document.documentElement.classList.remove("dcg-theme-loading");
    }, 3000);
    window.addEventListener("DOMContentLoaded", () => {
      window.requestAnimationFrame(() => {
        document.documentElement.classList.remove("dcg-theme-loading");
      });
    });
  </script>
{% endblock %}

{% endblock %}
