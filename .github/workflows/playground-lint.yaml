name: Playground Lint

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/playground-lint.yaml'
      - 'docs/assets/playground/**'
      - 'docs/playground.md'
      - 'pyproject.toml'
      - 'scripts/build_playground_assets.py'
      - 'tox.ini'
      - 'uv.lock'
      - 'zensical.toml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/playground-lint.yaml'
      - 'docs/assets/playground/**'
      - 'docs/playground.md'
      - 'pyproject.toml'
      - 'scripts/build_playground_assets.py'
      - 'tox.ini'
      - 'uv.lock'
      - 'zensical.toml'
  workflow_dispatch:

concurrency:
  group: playground-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playground-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-suffix: playground-lint
      - name: Setup Python
        run: uv python install 3.14
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Install tox
        run: uv tool install --python-preference only-managed --python 3.14 tox --with tox-uv
      - name: Run playground lint
        run: tox run -e playground-lint
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
