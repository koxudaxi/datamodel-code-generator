name: Update README

on:
  push:
    branches: [main]
    paths:
      - 'src/datamodel_code_generator/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/datamodel_code_generator/**'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      # Fork PRs run read-only without repository credentials.
      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          persist-credentials: false
      # Same-repo branches can keep credentials for generated-file pushes.
      - uses: actions/checkout@v4
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          token: ${{ github.token }}
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5
      - name: Install tox
        run: uv tool install --python-preference only-managed --python 3.13 tox --with tox-uv
      - name: Setup environment
        run: tox run -vv --notest --skip-missing-interpreters false -e readme
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Update README
        run: .tox/readme/bin/python scripts/update_command_help_on_markdown.py
      - name: Commit and push if changed
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/index.md
          git diff --staged --quiet || git commit -m "docs: update command help in README

          🤖 Generated by GitHub Actions"
          git push
