name: Update Schema Docs

on:
  push:
    branches: [main]
    paths:
      - 'src/datamodel_code_generator/parser/schema_version.py'
      - 'scripts/build_schema_docs.py'
      - 'docs/supported_formats.md'
  pull_request:
    branches: [main]
    paths:
      - 'src/datamodel_code_generator/parser/schema_version.py'
      - 'scripts/build_schema_docs.py'
      - 'docs/supported_formats.md'

permissions:
  contents: write

jobs:
  update-schema-docs:
    runs-on: ubuntu-latest
    steps:
      # Fork PRs run read-only without repository credentials.
      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          persist-credentials: false
      # Same-repo branches can be fixed in place without persisting credentials.
      - uses: actions/checkout@v4
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5
      - name: Install tox
        run: uv tool install --python-preference only-managed --python 3.13 tox --with tox-uv
      - name: Setup environment
        run: tox run -vv --notest --skip-missing-interpreters false -e schema-docs
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Build schema docs
        run: .tox/schema-docs/bin/python scripts/build_schema_docs.py
      - name: Create fork auto-fix patch
        id: fork_patch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        env:
          COMMIT_MESSAGE: "docs: update schema feature documentation"
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          if git diff --quiet -- docs/supported_formats.md; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --binary -- docs/supported_formats.md > autofix.patch
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          Path("metadata.json").write_text(
              json.dumps(
                  {
                      "commit_message": os.environ["COMMIT_MESSAGE"],
                      "head_ref": os.environ["HEAD_REF"],
                      "head_repo": os.environ["HEAD_REPO"],
                      "head_sha": os.environ["HEAD_SHA"],
                      "workflow": os.environ["WORKFLOW_NAME"],
                  },
                  sort_keys=True,
              ),
              encoding="utf-8",
          )
          PY
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
      - name: Upload fork auto-fix patch
        if: steps.fork_patch.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: autofix-patch
          path: |
            autofix.patch
            metadata.json
          retention-days: 1
      - name: Commit and push if changed
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          PUSH_TOKEN: ${{ secrets.PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/supported_formats.md
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "docs: update schema feature documentation"
          if [ "${{ github.event_name }}" = "push" ]; then
            TARGET_REPO="${{ github.repository }}"
            TARGET_REF="${{ github.ref_name }}"
          else
            TARGET_REPO="${{ github.event.pull_request.head.repo.full_name }}"
            TARGET_REF="${{ github.event.pull_request.head.ref }}"
          fi
          git push "https://x-access-token:${PUSH_TOKEN}@github.com/${TARGET_REPO}.git" "HEAD:${TARGET_REF}"
