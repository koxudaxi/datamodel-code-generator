name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: >-
      ${{ matrix.py || matrix.name }} on
      ${{ matrix.os == 'windows-latest' && 'Windows' || (matrix.os == 'macos-latest' && 'macOS' || 'Ubuntu') }}
    strategy:
      fail-fast: false
      matrix:
        py: ["3.14", "3.13", "3.12", "3.11", "3.10"]
        os: [windows-latest, macos-latest]
        tox_env: ['']
        include:
          - tox_env: py312-blacklatest-nocov-parallel
            name: py312-black-latest
          - tox_env: py312-black24-nocov-parallel
            name: py312-black24
          - tox_env: py312-black23-nocov-parallel
            name: py312-black23
          - tox_env: py312-black22-nocov-parallel
            name: py312-black22
          - tox_env: py312-isort8-nocov-parallel
            name: py312-isort8
          - tox_env: py312-isort7-nocov-parallel
            name: py312-isort7
          - tox_env: py312-isort6-nocov-parallel
            name: py312-isort6
          - tox_env: py312-isort5-nocov-parallel
            name: py312-isort5
    runs-on: ${{ matrix.os == '' && 'ubuntu-24.04' || matrix.os }}
    env:
      OS: ${{ matrix.os == '' && 'ubuntu-24.04' || matrix.os}}
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      with:
        enable-cache: true
        cache-suffix: "${{ matrix.py || matrix.tox_env }}"
    - name: Install tox
      run: uv tool install --python-preference only-managed --python 3.13 tox --with tox-uv
    - name: Set tox environment
      run: |
        if [ -n "${{ matrix.py }}" ]; then
          TOX_ENV="py${{ matrix.py }}-parallel"
          TOX_ENV="${TOX_ENV//.}"
          if [ "${{ matrix.os }}" = "windows-latest" ] || [ "${{ matrix.os }}" = "macos-latest" ]; then
            TOX_ENV="${TOX_ENV/-parallel/-nocov-parallel}"
          fi
        else
          TOX_ENV="${{ matrix.tox_env }}"
        fi
        echo "TOX_ENV=$TOX_ENV" >> "$GITHUB_ENV"
      shell: bash
    - name: Setup Python test environment
      run: |
        tox run -vv --notest --skip-missing-interpreters false -e $TOX_ENV
      shell: bash
      env:
        UV_PYTHON_PREFERENCE: "only-managed"
    - name: Run test suite
      run: |
        tox run --skip-uv-sync --skip-pkg-install -e $TOX_ENV
      shell: bash
      env:
        UV_PYTHON_PREFERENCE: "only-managed"

  test-coverage:
    name: ${{ matrix.name }} on Ubuntu
    strategy:
      fail-fast: false
      matrix:
        include:
          - tox_env: py314-parallel
            name: "3.14"
            coverage_name: "3.14"
          - tox_env: pydantic20
            name: pydantic20
            coverage_name: pydantic20
          - tox_env: pydantic25
            name: pydantic25
            coverage_name: pydantic25
    runs-on: ubuntu-24.04
    env:
      OS: ubuntu-24.04
      TOX_ENV: ${{ matrix.tox_env }}
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      with:
        enable-cache: true
        cache-suffix: "${{ matrix.tox_env }}"
    - name: Install tox
      run: uv tool install --python-preference only-managed --python 3.13 tox --with tox-uv
    - name: Setup Python test environment
      run: |
        tox run -vv --notest --skip-missing-interpreters false -e "$TOX_ENV"
      shell: bash
      env:
        UV_PYTHON_PREFERENCE: "only-managed"
    - name: Run test suite
      run: |
        tox run --skip-uv-sync --skip-pkg-install -e "$TOX_ENV"
      shell: bash
      env:
        UV_PYTHON_PREFERENCE: "only-managed"
    - name: Rename coverage report file
      run: |
        import os

        os.rename(
            f".tox/.coverage.{os.environ['TOX_ENV']}",
            f".tox/.coverage.${{ matrix.coverage_name }}-{os.environ['OS']}",
        )
      shell: python
    - name: Upload coverage data
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        include-hidden-files: true
        name: .coverage.${{ matrix.coverage_name }}-ubuntu-24.04
        path: ".tox/.coverage.*"
        retention-days: 3

  test-formatter-coverage:
    name: ${{ matrix.name }} coverage on Ubuntu
    strategy:
      fail-fast: false
      matrix:
        include:
          - tox_env: py312-blacklatest-parallel
            name: py312-black-latest
            coverage_name: py312-black-latest
          - tox_env: py312-black22-parallel
            name: py312-black22
            coverage_name: py312-black22
    runs-on: ubuntu-24.04
    env:
      OS: ubuntu-24.04
      TOX_ENV: ${{ matrix.tox_env }}
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      with:
        enable-cache: true
        cache-suffix: "${{ matrix.tox_env }}-coverage"
    - name: Install tox
      run: uv tool install --python-preference only-managed --python 3.13 tox --with tox-uv
    - name: Setup Python test environment
      run: |
        tox run -vv --notest --skip-missing-interpreters false -e "$TOX_ENV"
      shell: bash
      env:
        UV_PYTHON_PREFERENCE: "only-managed"
    - name: Select formatter coverage tests
      run: |
        case "$TOX_ENV" in
          py312-blacklatest-parallel)
            cat > .tox/formatter-coverage-tests.txt <<'EOF'
        tests/test_main_kr.py::test_main_no_file
        EOF
            ;;
          py312-black22-parallel)
            cat > .tox/formatter-coverage-tests.txt <<'EOF'
        tests/test_types.py
        tests/main/jsonschema/test_main_jsonschema.py::test_main_keep_model_order_matrix_keep_model_order_field_references[3.13-True-False]
        tests/main/jsonschema/test_main_jsonschema.py::test_main_combined_array
        tests/main/jsonschema/test_main_jsonschema.py::test_main_strict_types_all
        tests/main/openapi/test_main_openapi.py::test_pyproject
        tests/main/openapi/test_main_openapi.py::test_main_use_generic_container_types
        tests/main/openapi/test_main_openapi.py::test_main_use_generic_container_types_standard_collections
        tests/main/openapi/test_main_openapi.py::test_main_openapi_enum_models_as_literal_all
        tests/main/openapi/test_main_openapi.py::test_main_openapi_enum_models_as_literal
        tests/parser/test_openapi.py::test_openapi_parser_with_query_parameters
        tests/parser/test_openapi.py::test_openapi_parser_with_include_path_parameters
        tests/test_main_kr.py::test_main_no_file
        tests/test_main_kr.py::test_pyproject
        EOF
            ;;
          *)
            echo "Unsupported formatter coverage tox env: $TOX_ENV" >&2
            exit 1
            ;;
        esac
      shell: bash
    - name: Run formatter coverage tests
      run: |
        mapfile -t test_paths < .tox/formatter-coverage-tests.txt
        tox run --skip-uv-sync --skip-pkg-install -e "$TOX_ENV" -- \
          -n auto \
          --dist=worksteal \
          --color=yes \
          -m "not perf" \
          --cov datamodel_code_generator \
          --cov tests \
          --cov-config=pyproject.toml \
          --cov-fail-under=0 \
          --no-cov-on-fail \
          --cov-report term-missing:skip-covered \
          "${test_paths[@]}"
      shell: bash
      env:
        UV_PYTHON_PREFERENCE: "only-managed"
    - name: Rename coverage report file
      run: |
        import os

        os.rename(
            f".tox/.coverage.{os.environ['TOX_ENV']}",
            f".tox/.coverage.${{ matrix.coverage_name }}-{os.environ['OS']}",
        )
      shell: python
    - name: Upload coverage data
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        include-hidden-files: true
        name: .coverage.${{ matrix.coverage_name }}-ubuntu-24.04
        path: ".tox/.coverage.*"
        retention-days: 3

  test-shard:
    name: >-
      ${{ matrix.target.name }} on
      ${{ matrix.target.os == 'windows-latest' && 'Windows' || (matrix.target.os == 'macos-latest' && 'macOS' || 'Ubuntu') }}
      shard ${{ matrix.shard }}/3
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
        target:
          - tox_env: py313-parallel
            name: "3.13"
            os: ubuntu-24.04
            coverage: true
          - tox_env: py312-parallel
            name: "3.12"
            os: ubuntu-24.04
            coverage: true
          - tox_env: py311-parallel
            name: "3.11"
            os: ubuntu-24.04
            coverage: true
          - tox_env: py310-parallel
            name: "3.10"
            os: ubuntu-24.04
            coverage: true
    runs-on: ${{ matrix.target.os }}
    env:
      OS: ${{ matrix.target.os }}
      SHARD_INDEX: ${{ matrix.shard }}
      SHARD_TOTAL: 3
      TOX_ENV: ${{ matrix.target.tox_env }}
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      with:
        enable-cache: true
        cache-suffix: "${{ matrix.target.tox_env }}-shard-${{ matrix.shard }}"
    - name: Install tox
      run: uv tool install --python-preference only-managed --python 3.13 tox --with tox-uv
    - name: Setup Python test environment
      run: |
        tox run -vv --notest --skip-missing-interpreters false -e "$TOX_ENV"
      shell: bash
      env:
        UV_PYTHON_PREFERENCE: "only-managed"
    - name: Select test shard
      run: |
        python scripts/select_ci_test_shard.py --write-recipe .tox/ci-shard-recipe.json
        python scripts/select_ci_test_shard.py "$SHARD_INDEX" "$SHARD_TOTAL" \
          --recipe .tox/ci-shard-recipe.json | tee .tox/ci-shard-tests.txt
      shell: bash
    - name: Run sharded test suite with coverage
      if: matrix.target.coverage == true
      run: |
        mapfile -t test_paths < .tox/ci-shard-tests.txt
        tox run --skip-uv-sync --skip-pkg-install -e "$TOX_ENV" -- \
          -n auto \
          --dist=worksteal \
          --color=yes \
          -m "not perf" \
          --cov datamodel_code_generator \
          --cov tests \
          --cov-config=pyproject.toml \
          --cov-fail-under=0 \
          --no-cov-on-fail \
          --cov-report term-missing:skip-covered \
          "${test_paths[@]}"
      shell: bash
      env:
        UV_PYTHON_PREFERENCE: "only-managed"
    - name: Rename coverage report file
      if: matrix.target.coverage == true
      run: |
        import os

        os.rename(
            f".tox/.coverage.{os.environ['TOX_ENV']}",
            f".tox/.coverage.{os.environ['TOX_ENV']}-shard{os.environ['SHARD_INDEX']}-{os.environ['OS']}",
        )
      shell: python
    - name: Upload coverage data
      if: matrix.target.coverage == true
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        include-hidden-files: true
        name: .coverage.${{ matrix.target.tox_env }}-shard${{ matrix.shard }}-${{ matrix.target.os }}
        path: ".tox/.coverage.*"
        retention-days: 3

  coverage:
    name: combine coverage
    runs-on: ubuntu-latest
    needs:
      - test-coverage
      - test-formatter-coverage
      - test-shard
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Install tox
        run: uv tool install --python-preference only-managed --python 3.13 tox --with tox-uv
      - name: Setup coverage tool
        run: tox run -e coverage --notest
        env:
          UV_PYTHON_PREFERENCE: only-managed
      - name: Download coverage data
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: .tox
          pattern: .coverage.*
          merge-multiple: true
      - name: Combine and report coverage
        id: coverage
        run: tox run -e coverage --skip-uv-sync --skip-pkg-install
        continue-on-error: true
        env:
          UV_PYTHON_PREFERENCE: only-managed
      - name: Show uncovered lines on failure
        if: steps.coverage.outcome == 'failure'
        run: |
          echo "::error::Coverage check failed. Lines not covered:"
          COVERAGE_FILE=.tox/.coverage .tox/coverage/bin/coverage report --show-missing --fail-under=0 | grep -v "100%"
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: html-report
          path: .tox/htmlcov
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          flags: unittests
          files: .tox/coverage.xml
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Fail if coverage check failed
        if: steps.coverage.outcome == 'failure'
        run: exit 1

  check:
    name: ${{ matrix.tox_env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tox_env:
          - type
          - docs
          - pkg_meta
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Install tox
        run: uv tool install --python-preference only-managed --python 3.13 tox --with tox-uv
      - name: Setup check suite
        run: tox r -vv --notest --skip-missing-interpreters false -e ${{ matrix.tox_env }}
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Run check for ${{ matrix.tox_env }}
        run: tox run --skip-uv-sync --skip-pkg-install -e ${{ matrix.tox_env }}
        env:
          UV_PYTHON_PREFERENCE: "only-managed"

  w3c-xmlschema-e2e:
    name: W3C XML Schema e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Install tox
        run: uv tool install --python-preference only-managed --python 3.13 tox --with tox-uv
      - name: Setup W3C XML Schema e2e suite
        run: tox r -vv --notest --skip-missing-interpreters false -e w3c-xmlschema-e2e
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Cache W3C XML Schema Test Suite
        id: cache-w3c-xsdtests
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .tox/w3c-xsdtests
          key: e2e-xsdtests-7bc3365c652a322f3d762021b3879eb92dae7e30
      - name: Checkout W3C XML Schema Test Suite
        if: steps.cache-w3c-xsdtests.outputs.cache-hit != 'true'
        run: |
          git clone --filter=blob:none https://github.com/w3c/xsdtests.git .tox/w3c-xsdtests
          git -C .tox/w3c-xsdtests checkout 7bc3365c652a322f3d762021b3879eb92dae7e30
      - name: Run W3C XML Schema e2e suite
        run: |
          tox run --skip-uv-sync --skip-pkg-install -e w3c-xmlschema-e2e -- \
            .tox/w3c-xsdtests \
            --expected-documents 5284 \
            --expected-unique-documents 5283
        env:
          UV_PYTHON_PREFERENCE: "only-managed"

  jsonschema-suite-conformance:
    name: JSON-Schema-Test-Suite conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Install tox
        run: uv tool install --python-preference only-managed --python 3.13 tox --with tox-uv
      - name: Setup JSON-Schema-Test-Suite conformance
        run: tox r -vv --notest --skip-missing-interpreters false -e jsonschema-suite-conformance
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Checkout JSON-Schema-Test-Suite
        run: |
          git clone --filter=blob:none https://github.com/json-schema-org/JSON-Schema-Test-Suite.git .tox/json-schema-test-suite
          git -C .tox/json-schema-test-suite checkout fe8c2f0de2041943975932b6bf4bd882625b6cfb
      - name: Run JSON-Schema-Test-Suite conformance
        run: |
          tox run --skip-uv-sync --skip-pkg-install -e jsonschema-suite-conformance -- \
            .tox/json-schema-test-suite
        env:
          UV_PYTHON_PREFERENCE: "only-managed"

  asyncapi-spec-json-schemas-e2e:
    name: AsyncAPI spec JSON Schemas e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Install tox
        run: uv tool install --python-preference only-managed --python 3.13 tox --with tox-uv
      - name: Setup AsyncAPI spec JSON Schemas e2e suite
        run: tox r -vv --notest --skip-missing-interpreters false -e asyncapi-spec-json-schemas-e2e
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Cache AsyncAPI spec JSON Schemas
        id: cache-asyncapi-spec-json-schemas
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .tox/asyncapi-spec-json-schemas
          key: e2e-asyncapi-spec-json-schemas-469c2b2bf5ed88e0cdf1e48975b93a87c710d229
      - name: Checkout AsyncAPI spec JSON Schemas
        if: steps.cache-asyncapi-spec-json-schemas.outputs.cache-hit != 'true'
        run: |
          git clone --filter=blob:none https://github.com/asyncapi/spec-json-schemas.git .tox/asyncapi-spec-json-schemas
          git -C .tox/asyncapi-spec-json-schemas checkout 469c2b2bf5ed88e0cdf1e48975b93a87c710d229
      - name: Run AsyncAPI spec JSON Schemas e2e suite
        run: |
          tox run --skip-uv-sync --skip-pkg-install -e asyncapi-spec-json-schemas-e2e -- \
            .tox/asyncapi-spec-json-schemas/schemas \
            --expected-schemas 12
        env:
          UV_PYTHON_PREFERENCE: "only-managed"

  apache-avro-schema-pass-e2e:
    name: Apache Avro schema pass e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Install tox
        run: uv tool install --python-preference only-managed --python 3.13 tox --with tox-uv
      - name: Setup Apache Avro schema pass e2e suite
        run: tox r -vv --notest --skip-missing-interpreters false -e apache-avro-schema-pass-e2e
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Cache Apache Avro
        id: cache-apache-avro
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .tox/apache-avro
          key: e2e-apache-avro-9110c693767c1dde2665b2b57939333478b12036
      - name: Checkout Apache Avro
        if: steps.cache-apache-avro.outputs.cache-hit != 'true'
        run: |
          git clone --filter=blob:none https://github.com/apache/avro.git .tox/apache-avro
          git -C .tox/apache-avro checkout 9110c693767c1dde2665b2b57939333478b12036
      - name: Run Apache Avro schema pass e2e suite
        run: |
          tox run --skip-uv-sync --skip-pkg-install -e apache-avro-schema-pass-e2e -- \
            .tox/apache-avro/lang/c/tests/schema_tests/pass \
            --expected-schemas 28
        env:
          UV_PYTHON_PREFERENCE: "only-managed"

  protobuf-official-e2e:
    name: Protocol Buffers official e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Install tox
        run: uv tool install --python-preference only-managed --python 3.13 tox --with tox-uv
      - name: Setup Protocol Buffers official e2e suite
        run: tox r -vv --notest --skip-missing-interpreters false -e protobuf-official-e2e
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Cache Protocol Buffers
        id: cache-protobuf
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .tox/protobuf
          key: e2e-protobuf-4376cba55d9e2f44f7e317d9c10e0259d145f8cf
      - name: Checkout Protocol Buffers
        if: steps.cache-protobuf.outputs.cache-hit != 'true'
        run: |
          git clone --filter=blob:none --no-checkout https://github.com/protocolbuffers/protobuf.git .tox/protobuf
          git -C .tox/protobuf sparse-checkout init --cone
          git -C .tox/protobuf sparse-checkout set src conformance benchmarks
          git -C .tox/protobuf checkout 4376cba55d9e2f44f7e317d9c10e0259d145f8cf
      - name: Run Protocol Buffers official e2e suite
        run: |
          tox run --skip-uv-sync --skip-pkg-install -e protobuf-official-e2e -- \
            .tox/protobuf \
            --expected-schemas 65
        env:
          UV_PYTHON_PREFERENCE: "only-managed"

