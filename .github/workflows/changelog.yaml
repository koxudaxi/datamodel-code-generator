name: Update CHANGELOG

on:
  release:
    types: [published]

jobs:
  build-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.patch.outputs.has_changes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Get release info and update CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name }}"
          DATE=$(gh release view "$TAG" --json publishedAt --jq '.publishedAt | split("T")[0]')
          BODY=$(gh release view "$TAG" --json body --jq '.body // ""')

          # Create new entry
          {
            echo "## [$TAG](https://github.com/${{ github.repository }}/releases/tag/$TAG) - $DATE"
            echo ""
            printf '%s\n' "$BODY"
            echo ""
            echo "---"
            echo ""
          } > new_entry.md

          # Initialize CHANGELOG.md if it doesn't exist
          if [ ! -f CHANGELOG.md ]; then
            {
              echo "# Changelog"
              echo ""
              echo "All notable changes to this project are documented in this file."
              echo "This changelog is automatically generated from GitHub Releases."
              echo ""
              echo "---"
              echo ""
            } > CHANGELOG.md
          fi

          # Split CHANGELOG.md at first "---" separator (content-based, not line-number based)
          # Header includes everything up to and including the first "---" line
          # Old entries are everything after the first "---" line
          awk '/^---$/ && !found {found=1; print > "header.md"; next} !found {print > "header.md"} found {print > "old_entries.md"}' CHANGELOG.md

          # Ensure old_entries.md exists even if empty
          touch old_entries.md

          # Reassemble: header + new entry + old entries
          cat header.md new_entry.md old_entries.md > CHANGELOG.md
          rm -f header.md new_entry.md old_entries.md

      - name: Create changelog patch
        id: patch
        env:
          PATCH_PATH: ${{ runner.temp }}/changelog.patch
        run: |
          set -euo pipefail
          if git diff --quiet -- CHANGELOG.md; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --binary -- CHANGELOG.md > "$PATCH_PATH"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
      - name: Upload changelog patch
        if: steps.patch.outputs.has_changes == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: changelog-patch
          path: ${{ runner.temp }}/changelog.patch
          if-no-files-found: error

  commit-changelog:
    needs: build-changelog
    if: needs.build-changelog.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Download changelog patch
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: changelog-patch
          path: ${{ runner.temp }}
      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
          PATCH_PATH: ${{ runner.temp }}/changelog.patch
        run: |
          set -euo pipefail
          git apply --index --whitespace=nowarn "$PATCH_PATH"
          if git diff --staged --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: update CHANGELOG.md for ${{ github.event.release.tag_name }}"
          git fetch origin main
          git rebase origin/main
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
