[tox]
requires =
    tox>=4.24.1
    tox-uv>=1.23
env_list =
    fix
    py314-parallel
    py313-parallel
    py312-parallel
    py312-blacklatest-parallel
    py312-black{24, 23, 22}-parallel
    py312-isort{8, 7, 6, 5}-parallel
    py311-parallel
    py310-parallel
    readme
    cli-docs
    coverage
    pkg_meta
skip_missing_interpreters = true

[testenv]
runner = uv-venv-lock-runner
description = run the unit tests with pytest under {base_python}
package = wheel
wheel_build_env = .pkg
extras =
    all
pass_env =
    DIFF_AGAINST
    HTTP_IGNORE_TLS
    PYTEST_*
set_env =
    COVERAGE_FILE = {work_dir}/.coverage.{env_name}
    UV_CACHE_DIR = {work_dir}{/}uv-cache
    blacklatest: DATAMODEL_CODE_GENERATOR_CHECK_BUILTIN_FORMATTER_PARITY = 1
commands =
    pytest {posargs: \
      !parallel: -n0 \
      parallel: -n auto \
      --color=yes \
      -m "not perf" \
      --cov {env_site_packages_dir}{/}datamodel_code_generator --cov {tox_root}{/}tests \
      --cov-config=pyproject.toml --cov-fail-under=0 --no-cov-on-fail --cov-report term-missing:skip-covered \
      tests}
dependency_groups =
    test
    blacklatest: blacklatest
    black24: black24
    black23: black23
    black22: black22
    isort8: isort8
    isort7: isort7
    isort6: isort6
    isort5: isort5

[testenv:fix]
description = format the code base to adhere to our styles, and complain about what we cannot do automatically
commands =
    prek run --all-files --show-diff-on-failure
dependency_groups = fix

[testenv:readme]
description = Check help in readme is up to date
commands =
    python scripts/update_command_help_on_markdown.py {posargs:--check}
dependency_groups =
no_default_groups = true

[testenv:cli-docs]
description = Build CLI documentation (use --check to validate only)
commands =
    pytest --collect-cli-docs -p no:xdist -q
    python scripts/build_cli_docs.py {posargs}
dependency_groups = test
no_default_groups = true

[testenv:coverage]
description = combine coverage files and generate diff (against DIFF_AGAINST defaulting to origin/main)
skip_install = true
extras =
parallel_show_output = true
pass_env =
    DIFF_AGAINST
set_env =
    COVERAGE_FILE = {work_dir}/.coverage
commands =
    coverage combine
    coverage xml -o {work_dir}/coverage.xml
    coverage html -d {work_dir}/htmlcov
    diff-cover --compare-branch {env:DIFF_AGAINST:origin/main} {work_dir}/coverage.xml
    coverage report --fail-under=100 --skip-covered --show-missing
depends =
    py314-parallel
    py313-parallel
    py312-parallel
    py312-blacklatest-parallel
    py312-black{24, 23, 22}-parallel
    py312-isort{8, 7, 6, 5}-parallel
    py311-parallel
    py310-parallel
    pydantic25
    pydantic20
dependency_groups = coverage

[testenv:pkg_meta]
description = check that the long description is valid
skip_install = true
commands =
    uv build --sdist --wheel --out-dir {env_tmp_dir} .
    twine check {env_tmp_dir}{/}*
    check-wheel-contents --no-config {env_tmp_dir}
dependency_groups = pkg-meta

[testenv:w3c-xmlschema-e2e]
description = run XML Schema generation against the W3C XML Schema Test Suite
commands =
    python scripts/run_w3c_xmlschema_e2e.py {posargs}

[testenv:jsonschema-suite-conformance]
description = run generated model validation against JSON-Schema-Test-Suite
pass_env =
    DCG_JSON_SCHEMA_SUITE_DRAFTS
commands =
    python scripts/run_jsonschema_suite_conformance.py {posargs}

[testenv:asyncapi-spec-json-schemas-e2e]
description = run JSON Schema generation against the AsyncAPI spec JSON Schemas
commands =
    python scripts/run_asyncapi_spec_json_schemas_e2e.py {posargs}

[testenv:apache-avro-schema-pass-e2e]
description = run Avro generation against the Apache Avro C schema pass corpus
commands =
    python scripts/run_apache_avro_schema_pass_e2e.py {posargs}

[testenv:protobuf-official-e2e]
description = run Protocol Buffers generation against the official protobuf corpus
commands =
    python scripts/run_protobuf_official_e2e.py {posargs}

[testenv:schema-docs]
description = Build schema feature documentation (use --check to validate only)
commands =
    python scripts/build_schema_docs.py {posargs}
dependency_groups =
no_default_groups = true

[testenv:deprecation-docs]
description = Build deprecation documentation (use --check to validate only)
commands =
    python scripts/build_deprecation_docs.py {posargs}
dependency_groups =
no_default_groups = true

[testenv:experimental-docs]
description = Build experimental feature documentation (use --check to validate only)
commands =
    python scripts/build_experimental_docs.py {posargs}
dependency_groups =
no_default_groups = true

[testenv:llms-txt]
description = Generate llms.txt files (use --check to validate only, requires Python 3.11+)
commands =
    python scripts/build_llms_txt.py {posargs}
dependency_groups =
no_default_groups = true

[testenv:diagrams]
description = Render Mermaid diagrams to committed SVGs (use --check to validate staleness; rendering requires Node.js/npx)
commands =
    python scripts/build_diagrams.py {posargs}
dependency_groups =
no_default_groups = true

[testenv:generated-docs]
description = Update all generated documentation and prompt snapshots
set_env =
    {[testenv]set_env}
    PYTHONPATH = {tox_root}{/}src
commands =
    python scripts/update_command_help_on_markdown.py
    pytest --collect-cli-docs -p no:xdist -q
    python scripts/build_cli_docs.py
    python scripts/build_prompt_data.py
    python scripts/update_generate_prompt_snapshots.py
    python scripts/build_schema_docs.py
    python scripts/build_deprecation_docs.py
    python scripts/build_experimental_docs.py
    python scripts/build_llms_txt.py
    pytest \
      tests/test_main_kr.py::test_generate_prompt_basic \
      tests/test_main_kr.py::test_generate_prompt_with_question \
      tests/test_main_kr.py::test_generate_prompt_with_options \
      tests/test_main_kr.py::test_generate_prompt_with_list_options \
      -p no:xdist \
      -q
dependency_groups = test

[testenv:config-types]
description = Generate TypedDict files from config models (use --check to validate only)
commands =
    datamodel-codegen --profile generate-config-dict {posargs}
    datamodel-codegen --profile parser-config-dicts {posargs}
    datamodel-codegen --profile parse-config-dict {posargs}
dependency_groups = dev
no_default_groups = true

[testenv:type]
description = run type check on code base
commands =
    ty check src
dependency_groups = type

[testenv:docs]
description = generate documentation
base_python = python3.14
extras =
commands =
    python scripts/build_playground_assets.py
    zensical build
    python -c 'print("Documentation generated at file://{tox_root}{/}site{/}index.html")'
dependency_groups =
    docs
    playground

[testenv:playground-lint]
description = build and lint the browser playground t-string UI
base_python = python3.14
extras =
commands =
    python scripts/build_playground_assets.py
    t-linter check --error-on-issues docs/assets/playground/app.py
    t-linter format --check docs/assets/playground/app.py
dependency_groups = playground

[testenv:playground-format]
description = format the browser playground t-string UI
base_python = python3.14
extras =
commands =
    python scripts/build_playground_assets.py
    t-linter check --error-on-issues docs/assets/playground/app.py
    t-linter format docs/assets/playground/app.py
dependency_groups = playground

[testenv:dev]
description = generate a DEV environment
package = editable
extras =
    all
commands =
    uv pip tree
    python -c 'import sys; print(sys.executable)'
dependency_groups = dev

[testenv:pydantic25]
runner = uv-venv-runner
description = run Pydantic 2.5 regression tests under Python 3.12
base_python = python3.12
deps =
    pydantic==2.5.3
commands =
    pytest --color=yes -q \
      --cov {env_site_packages_dir}{/}datamodel_code_generator --cov {tox_root}{/}tests \
      --cov-config=pyproject.toml --cov-fail-under=0 --no-cov-on-fail \
      --cov-report xml:{env:COVERAGE_XML:{work_dir}{/}coverage.{env_name}.xml} \
      --junitxml {work_dir}{/}junit.{env_name}.xml \
      tests/main/test_main_general.py::test_show_help_when_no_input \
      tests/main/test_main_general.py::test_generated_pydantic_v2_model_accepts_runtime_value \
      tests/main/jsonschema/test_main_jsonschema.py::test_main_generate_pydantic_v2_dataclass_required_alias_field_pydantic20 \
      tests/main/openapi/test_main_openapi.py::test_main_openapi_deprecated_field_pydantic26 \
      tests/model/pydantic_v2/test_dataclass.py::test_data_model_field_keeps_existing_alias_fallback_state_pydantic20
dependency_groups = test

[testenv:pydantic20]
runner = uv-venv-runner
description = run Pydantic 2.0 lower-bound regression tests under Python 3.11
base_python = python3.11
deps =
    pydantic==2.0.3
commands =
    pytest --color=yes -q \
      --cov {env_site_packages_dir}{/}datamodel_code_generator --cov {tox_root}{/}tests \
      --cov-config=pyproject.toml --cov-fail-under=0 --no-cov-on-fail \
      --cov-report xml:{env:COVERAGE_XML:{work_dir}{/}coverage.{env_name}.xml} \
      --junitxml {work_dir}{/}junit.{env_name}.xml \
      tests/main/test_main_general.py::test_show_help_when_no_input \
      tests/main/test_main_general.py::test_generated_pydantic_v2_model_accepts_runtime_value \
      tests/main/jsonschema/test_main_jsonschema.py::test_main_generate_pydantic_v2_dataclass_required_alias_field_pydantic20 \
      tests/main/openapi/test_main_openapi.py::test_main_openapi_deprecated_field_pydantic26 \
      tests/model/pydantic_v2/test_dataclass.py::test_data_model_field_keeps_existing_alias_fallback_state_pydantic20
dependency_groups = test

[testenv:py311-payload-runtime-min]
runner = uv-venv-runner
description = run payload validation against minimum payload runtime dependencies under Python 3.11
base_python = python3.11
deps =
    msgspec==0.18
    pydantic==2.0.3
pass_env =
    DCG_PAYLOAD_BACKEND_CASES
    DCG_PAYLOAD_MAX_EXAMPLES
commands =
    pytest --color=yes -q \
      tests/main/test_payload_validation.py \
      tests/main/test_exec_validation.py
dependency_groups = test

[testenv:py311-payload-runtime-latest]
runner = uv-venv-runner
description = run payload validation against latest runtime dependencies under Python 3.11
base_python = python3.11
deps =
    msgspec
    pydantic<3
pass_env =
    DCG_PAYLOAD_BACKEND_CASES
    DCG_PAYLOAD_MAX_EXAMPLES
commands =
    pytest --color=yes -q \
      tests/main/test_payload_validation.py \
      tests/main/test_exec_validation.py
dependency_groups = test

[testenv:py314-payload-runtime-min]
runner = uv-venv-runner
description = run payload validation against minimum Python 3.14-compatible runtime dependencies
base_python = python3.14
deps =
    msgspec==0.20
    pydantic==2.12
pass_env =
    DCG_PAYLOAD_BACKEND_CASES
    DCG_PAYLOAD_MAX_EXAMPLES
commands =
    pytest --color=yes -q \
      tests/main/test_payload_validation.py \
      tests/main/test_exec_validation.py
dependency_groups = test

[testenv:py314-payload-runtime-latest]
runner = uv-venv-runner
description = run payload validation against latest runtime dependencies under Python 3.14
base_python = python3.14
deps =
    msgspec
    pydantic<3
pass_env =
    DCG_PAYLOAD_BACKEND_CASES
    DCG_PAYLOAD_MAX_EXAMPLES
commands =
    pytest --color=yes -q \
      tests/main/test_payload_validation.py \
      tests/main/test_exec_validation.py
dependency_groups = test

[testenv:lock]
runner = uv-venv-runner
description = refresh requirement files
skip_install = true
commands =
    uv lock --refresh --upgrade
dependency_groups =

[testenv:perf]
description = run performance benchmarks with codspeed (Python 3.14, Unix only)
base_python = python3.14
commands =
    pytest {posargs: \
      -n auto \
      --color=yes \
      --codspeed \
      tests/main/test_performance.py}
dependency_groups =
    test
    benchmark
platform = linux|darwin
