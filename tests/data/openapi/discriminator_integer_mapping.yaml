openapi: 3.0.3
info:
  title: Minimal Integer Discriminator
  version: 1.0.0
paths: {}
components:
  schemas:
    Base:
      oneOf:
        - $ref: '#/components/schemas/Foo'
        - $ref: '#/components/schemas/Bar'
      discriminator:
        propertyName: kind
        mapping:
          '1': '#/components/schemas/Foo'
          '2': '#/components/schemas/Bar'
          '3': '#/components/schemas/Bar'
    Foo:
      type: object
      properties:
        kind:
          type: integer
          enum:
            - 1
      required:
        - kind
    Bar:
      type: object
      properties:
        kind:
          type: integer
          enum:
            - 2
            - 3
      required:
        - kind
