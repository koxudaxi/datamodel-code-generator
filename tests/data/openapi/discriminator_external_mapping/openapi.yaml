openapi: 3.0.3
info:
  title: External discriminator mapping
  version: '1.0'
paths: {}
components:
  schemas:
    Item:
      type: object
      required:
        - kind
      properties:
        kind:
          type: string
      discriminator:
        propertyName: kind
        mapping:
          foo: './schemas/foo.yaml#/components/schemas/Foo'
          bar: './schemas/bar.yaml#/components/schemas/Bar'
    Wrapper:
      type: object
      properties:
        item:
          $ref: '#/components/schemas/Item'
