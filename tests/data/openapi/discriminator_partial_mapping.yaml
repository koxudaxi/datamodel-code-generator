openapi: 3.1.0
info:
  title: Test
  version: 0.0.0
paths:
  /item:
    get:
      responses:
        '200':
          description: Item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemContainer'
components:
  schemas:
    ItemContainer:
      type: object
      required:
        - item
      properties:
        item:
          $ref: '#/components/schemas/BaseItem'
    BaseItem:
      type: object
      required:
        - itemType
      properties:
        itemType:
          type: string
      discriminator:
        propertyName: itemType
        mapping:
          foo: '#/components/schemas/FooItem'
    FooItem:
      allOf:
        - $ref: '#/components/schemas/BaseItem'
        - type: object
          properties:
            fooValue:
              type: string
    BarItem:
      allOf:
        - $ref: '#/components/schemas/BaseItem'
        - type: object
          properties:
            barValue:
              type: integer
