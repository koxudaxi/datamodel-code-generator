asyncapi: 2.6.0
info:
  title: User events
  version: 1.0.0
channels:
  user/signedup:
    subscribe:
      message:
        $ref: '#/components/messages/UserSignedUp'
components:
  messages:
    UserSignedUp:
      payload:
        $ref: '#/components/schemas/UserSignedUpPayload'
  schemas:
    UserSignedUpPayload:
      type: object
      required:
        - user
        - occurredAt
      properties:
        user:
          $ref: '#/components/schemas/User'
        occurredAt:
          type: string
          format: date-time
    User:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
          nullable: true
        address:
          $ref: '#/components/schemas/Address'
    NullableProbe:
      type: object
      nullable: true
      properties:
        value:
          type: string
    Address:
      type: object
      properties:
        city:
          type: string
        postalCode:
          type: string
