asyncapi: 3.0.0
info:
  title: AsyncAPI stable surface
  version: 1.0.0
channels:
  userLifecycle:
    $ref: '#/components/channels/UserLifecycle'
  bindingRefChannel:
    $ref: '#/components/channels/BindingRefChannel'
  badRef:
    $ref: true
  cycleChannel:
    $ref: '#/channels/cycleChannel'
operations:
  receiveUserCreated:
    $ref: '#/components/operations/ReceiveUserCreated'
  badRef:
    $ref: true
  cycleOperation:
    $ref: '#/operations/cycleOperation'
  badReplyScalar:
    reply: true
  badReplyRef:
    reply:
      $ref: true
  emptyReply:
    reply:
      channel:
        $ref: '#/components/channels/UserLifecycle'
  replyByRef:
    reply:
      $ref: '#/components/replies/UserCreatedReply'
  replyCycle:
    reply:
      $ref: '#/components/replies/ReplyCycle'
components:
  replies:
    ReplyCycle:
      $ref: '#/components/replies/ReplyCycle'
    UserCreatedReply:
      messages:
        - $ref: '#/components/messages/UserCreatedAck'
  channels:
    UserLifecycle:
      address: users.lifecycle
      parameters:
        userId:
          $ref: '#/components/parameters/UserId'
        eventShard:
          schema:
            type: object
            required:
              - shardId
            properties:
              shardId:
                type: string
        badParameter: true
      bindings:
        websockets:
          query:
            type: object
            required:
              - token
            properties:
              token:
                type: string
          headers:
            type: object
            properties:
              x-request-id:
                type: string
          bindingVersion: '0.1.0'
        kafka:
          topic: users.lifecycle
          partitions: 3
          bindingVersion: '0.5.0'
      messages:
        userCreated:
          $ref: '#/components/messages/UserCreated'
        headerWithTraitBinding:
          $ref: '#/components/messages/HeaderWithTraitBinding'
    BindingRefChannel:
      bindings:
        $ref: '#/components/x-bindings/WebsocketBinding'
      messages:
        bindingRef:
          $ref: '#/components/messages/BindingRefMessage'
  operations:
    ReceiveUserCreated:
      action: receive
      channel:
        $ref: '#/components/channels/UserLifecycle'
      traits:
        - not-a-trait
        - $ref: '#/components/operationTraits/noBindings'
        - $ref: '#/components/operationTraits/httpConsumer'
      bindings:
        http:
          query:
            type: object
            required:
              - consumer
            properties:
              consumer:
                type: string
          bindingVersion: '0.3.0'
        kafka:
          groupId:
            type: object
            required:
              - group
            properties:
              group:
                type: string
          clientId:
            type: object
            properties:
              client:
                type: string
      messages:
        - $ref: '#/components/messages/UserCreated'
      reply:
        channel:
          $ref: '#/components/channels/UserLifecycle'
        messages:
          - $ref: '#/components/messages/UserCreatedAck'
    BindingRefOperation:
      action: send
      bindings:
        http:
          $ref: '#/components/x-protocol-bindings/HttpOperationBinding'
        scalar:
          true
      messages:
        - $ref: '#/components/messages/BindingRefMessage'
  x-bindings:
    WebsocketBinding:
      websockets:
        query:
          type: object
          properties:
            bindingRefToken:
              type: string
        headers:
          type: object
          properties:
            bindingRefHeader:
              type: string
  x-protocol-bindings:
    HttpOperationBinding:
      query:
        type: object
        properties:
          protocolRefQuery:
            type: string
    HttpMessageBinding:
      headers:
        type: object
        properties:
          protocolMessageHeader:
            type: string
  operationTraits:
    noBindings:
      summary: No binding schema here
    httpConsumer:
      bindings:
        http:
          query:
            type: object
            properties:
              traitQuery:
                type: string
          bindingVersion: '0.3.0'
  messageTraits:
    noHeaders:
      correlationId:
        description: Not a schema-bearing trait field
    cycleTrait:
      $ref: '#/components/messageTraits/cycleTrait'
    traceHeaders:
      headers:
        type: object
        required:
          - traceId
        properties:
          traceId:
            type: string
          attempt:
            type: integer
      bindings:
        http:
          headers:
            type: object
            properties:
              x-trait:
                type: string
          bindingVersion: '0.3.0'
    bindingOnly:
      bindings:
        kafka:
          key:
            type: object
            properties:
              traitKey:
                type: string
          bindingVersion: '0.5.0'
  parameters:
    UserId:
      schema:
        type: string
    NoSchema:
      description: Not a schema-bearing parameter
  messages:
    UserCreated:
      traits:
        - not-a-trait
        - $ref: true
        - $ref: '#/components/messageTraits/noHeaders'
        - $ref: '#/components/messageTraits/traceHeaders'
      bindings:
        kafka:
          key:
            type: object
            required:
              - key
            properties:
              key:
                type: string
          bindingVersion: '0.5.0'
        http:
          headers:
            type: object
            required:
              - content-type
            properties:
              content-type:
                type: string
          bindingVersion: '0.3.0'
      payload:
        $ref: '#/components/schemas/UserCreatedPayload'
    UserCreatedAck:
      bindings: true
      payload:
        type: object
        required:
          - accepted
        properties:
          accepted:
            type: boolean
          reason:
            type:
              - string
              - 'null'
    HeaderWithTraitBinding:
      traits:
        - $ref: '#/components/messageTraits/bindingOnly'
      headers:
        type: object
        properties:
          directHeader:
            type: string
      payload:
        type: object
        properties:
          value:
            type: string
    BindingRefMessage:
      bindings:
        http:
          $ref: '#/components/x-protocol-bindings/HttpMessageBinding'
      payload:
        type: object
        properties:
          refValue:
            type: string
  schemas:
    OpenApiDecorated:
      schemaFormat: application/vnd.oai.openapi+json;version=3.1.0
      schema:
        type: object
        properties:
          openapiId:
            type: string
    WrapperWithoutFormat:
      x-source: multi-format-default
      schema:
        type: object
        properties:
          wrapped:
            type: boolean
    UserCreatedPayload:
      type: object
      required:
        - user
        - eventId
      properties:
        eventId:
          type: string
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        email:
          type: string
          format: email
